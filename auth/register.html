<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/css/theme.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParcelLink | Register</title>

    <!-- Correct paths when served by Express -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="auth-page">

    <div class="auth-wrapper">
        <img src="/images/logo.png" alt="ParcelLink Logo" class="auth-logo">

        <h2>Create Account</h2>
        <p>Join ParcelLink and enjoy fast global deliveries</p>

        <form id="registerForm">
            <input type="text" id="fullName" name="fullName" placeholder="Full Name" required>

            <input type="email" id="email" name="email" placeholder="Email" required>

            <div class="password-container">
                <input type="password" id="password" name="password" placeholder="Password" required>
                <i class="fa fa-eye toggle-password" onclick="togglePwd('password', this)"></i>
            </div>

            <button type="submit">Register</button>
        </form>

        <p>Already have an account? <a href="/login">Login</a></p>
    </div>

    <!-- ================= JS ================= -->
<script src="/js/i18n.js"></script>
<script src="/js/site.js"></script>
</body>
</html>
