<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/css/theme.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title data-i18n="auth.register.metaTitle">ParcelLink | Register</title>

    <!-- Correct paths when served by Express -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="auth-page">

    <div class="auth-wrapper">
        <img src="/images/logo.png" alt="ParcelLink Logo" class="auth-logo">

        <h2 data-i18n="auth.register.heading">Create Account</h2>
        <p data-i18n="auth.register.subtitle">Join ParcelLink and enjoy fast global deliveries</p>

        <form id="registerForm">
            <input type="text" id="fullName" name="fullName" data-i18n-placeholder="auth.register.fullNamePlaceholder" placeholder="Full Name" required>

            <input type="email" id="email" name="email" data-i18n-placeholder="auth.register.emailPlaceholder" placeholder="Email" required>

            <div class="password-container">
                <input type="password" id="password" name="password" data-i18n-placeholder="auth.register.passwordPlaceholder" placeholder="Password" required>
                <i class="fa fa-eye toggle-password" onclick="togglePwd('password', this)"></i>
            </div>

            <button type="submit" data-i18n="auth.register.button">Register</button>
        </form>

        <p><span data-i18n="auth.register.hasAccount">Already have an account?</span> <a href="/login" data-i18n="auth.register.loginLink">Login</a></p>
    </div>

    <!-- ================= JS ================= -->
<script src="/js/i18n.js"></script>
<script src="/js/site.js"></script>
</body>
</html>
