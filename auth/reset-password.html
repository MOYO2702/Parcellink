<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/css/theme.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>ParcelLink | Reset Password</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-page">
  <div class="auth-wrapper">
    <span class="auth-kicker">ParcelLink Access</span>
    <img src="/images/logo.png" alt="ParcelLink Logo" class="auth-logo">
    <h2>Create a new password</h2>
    <p>Enter your new ParcelLink password below.</p>

    <form id="resetPasswordForm">
      <div class="password-container">
        <input type="password" id="password" placeholder="New password" required autocomplete="new-password">
        <i class="fa fa-eye toggle-password" onclick="togglePwd('password', this)"></i>
      </div>
      <div class="password-container">
        <input type="password" id="confirmPassword" placeholder="Confirm new password" required autocomplete="new-password">
        <i class="fa fa-eye toggle-password" onclick="togglePwd('confirmPassword', this)"></i>
      </div>
      <button type="submit">Reset password</button>
    </form>
    <p id="resetPasswordMessage" class="auth-status" role="status" aria-live="polite"></p>

    <p><a href="/login">Back to login</a></p>
  </div>

  <script>
  function togglePwd(id, icon) {
    const field = document.getElementById(id);
    if (!field) return;
    field.type = field.type === "password" ? "text" : "password";
    icon.classList.toggle("fa-eye-slash");
  }

  function setResetMessage(messageNode, text, type) {
    messageNode.className = `auth-status ${type || ""}`.trim();
    messageNode.textContent = text;
  }

  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("resetPasswordForm");
    const message = document.getElementById("resetPasswordMessage");
    const submitButton = form?.querySelector('button[type="submit"]');
    const token = new URLSearchParams(window.location.search).get("token") || "";

    if (!form || !message || !submitButton) return;
    if (!token) {
      setResetMessage(message, "This reset link is invalid or incomplete.", "error");
      submitButton.disabled = true;
      return;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const password = document.getElementById("password")?.value || "";
      const confirmPassword = document.getElementById("confirmPassword")?.value || "";

      if (password.length < 8) {
        setResetMessage(message, "Password must be at least 8 characters.", "error");
        return;
      }

      if (password !== confirmPassword) {
        setResetMessage(message, "Passwords do not match.", "error");
        return;
      }

      setResetMessage(message, "Resetting your password...", "info");
      submitButton.disabled = true;
      submitButton.setAttribute("aria-busy", "true");

      try {
        const response = await fetch("/api/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password })
        });
        const data = await response.json();
        if (!response.ok || !data.success) {
          setResetMessage(message, data.message || "Unable to reset password right now.", "error");
          return;
        }
        setResetMessage(message, data.message || "Password reset successful. You can now log in.", "success");
        form.reset();
        window.setTimeout(() => {
          window.location.href = "/login";
        }, 1600);
      } catch (error) {
        console.error("Reset password error:", error);
        setResetMessage(message, "Unable to reach the server. Please try again.", "error");
      } finally {
        submitButton.disabled = false;
        submitButton.removeAttribute("aria-busy");
      }
    });
  });
  </script>
  <script src="/js/i18n.js"></script>
  <script src="/js/site.js"></script>
</body>
</html>
