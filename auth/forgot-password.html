<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/css/theme.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>ParcelLink | Forgot Password</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-page">
  <div class="auth-wrapper">
    <span class="auth-kicker">ParcelLink Access</span>
    <img src="/images/logo.png" alt="ParcelLink Logo" class="auth-logo">
    <h2>Reset your password</h2>
    <p>Enter the email address you used for ParcelLink and we will send you a reset link.</p>

    <form id="forgotPasswordForm">
      <input type="email" id="email" placeholder="Email address" required autocomplete="email">
      <button type="submit">Send reset link</button>
    </form>
    <p id="forgotPasswordMessage" class="auth-status" role="status" aria-live="polite"></p>

    <p><a href="/login">Back to login</a></p>
  </div>

  <script>
  function setForgotMessage(messageNode, text, type) {
    messageNode.className = `auth-status ${type || ""}`.trim();
    messageNode.textContent = text;
  }

  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("forgotPasswordForm");
    const message = document.getElementById("forgotPasswordMessage");
    const submitButton = form?.querySelector('button[type="submit"]');

    if (!form || !message || !submitButton) return;

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const email = document.getElementById("email")?.value.trim() || "";
      setForgotMessage(message, "Sending reset link...", "info");
      submitButton.disabled = true;
      submitButton.setAttribute("aria-busy", "true");

      try {
        const response = await fetch("/api/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
        const data = await response.json();
        if (!response.ok || !data.success) {
          setForgotMessage(message, data.message || "Unable to send reset link right now.", "error");
          return;
        }
        setForgotMessage(message, data.message || "If an account exists for that email, a password reset link has been sent.", "success");
      } catch (error) {
        console.error("Forgot password error:", error);
        setForgotMessage(message, "Unable to reach the server. Please try again.", "error");
      } finally {
        submitButton.disabled = false;
        submitButton.removeAttribute("aria-busy");
      }
    });
  });
  </script>
  <script src="/js/i18n.js"></script>
  <script src="/js/site.js"></script>
</body>
</html>
