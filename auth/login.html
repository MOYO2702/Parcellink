<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/css/theme.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParcelLink | Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="auth-page">

    <div class="auth-wrapper">
        <img src="/images/logo.png" alt="ParcelLink Logo" class="auth-logo">

        <h2>Welcome</h2>
        <p>Log in to your ParcelLink Account</p>

        <!-- FIXED: Added id="loginForm" -->
        <form id="loginForm">

            <!-- FIXED: Added id="identifier" -->
            <input type="text" id="identifier" placeholder="Email or Suite Number" required>

            <div class="password-container">
                <!-- FIXED: Added id="password" -->
                <input type="password" id="password" placeholder="Password" required>
                <i class="fa fa-eye toggle-password"
                   onclick="togglePwd('password', this)"></i>
            </div>

            <a href="#" class="forgot-link">Forgot password?</a>

            <button type="submit">Log In</button>
        </form>

        <p>Don't have an account? <a href="/register">Register</a></p>
    </div>

<script>

// ============= Fix missing togglePwd function ============
function togglePwd(id, icon) {
    const field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
    icon.classList.toggle("fa-eye-slash");
}

// ============= LOGIN SCRIPT =================
document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("loginForm");

    if (!form) {
        console.error("loginForm not found!");
        return;
    }

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const identifier = document.getElementById("identifier").value.trim();
        const password = document.getElementById("password").value.trim();

        try {
            const res = await fetch("/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ identifier, password })
            });

            const data = await res.json();
            console.log("Login Response:", data);

            if (data.success) {
                alert(` Welcome ${data.user.fullName}`);
                localStorage.setItem("parcelUser", JSON.stringify(data.user));
                if (data.token) {
                    localStorage.setItem("parcelAuthToken", data.token);
                }
                window.location.href = "/dashboard";  // redirect to homepage
            } else {
                alert(" " + data.message);
            }

        } catch (error) {
            console.error("Login error:", error);
            alert("Something went wrong. Try again.");
        }
    });
});
</script>
<!-- ensure login page uses /js path -->
<script src="/js/i18n.js"></script>
<script src="/js/site.js"></script>
</body>
</html>
