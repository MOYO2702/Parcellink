<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/css/theme.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title data-i18n="auth.login.metaTitle">ParcelLink | Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="auth-page">

    <div class="auth-wrapper">
        <span class="auth-kicker">ParcelLink Access</span>
        <img src="/images/logo.png" alt="ParcelLink Logo" class="auth-logo">

        <h2 data-i18n="auth.login.heading">Welcome</h2>
        <p data-i18n="auth.login.subtitle">Log in to your ParcelLink Account</p>

        <!-- FIXED: Added id="loginForm" -->
        <form id="loginForm">

            <!-- FIXED: Added id="identifier" -->
            <input type="text" id="identifier" data-i18n-placeholder="auth.login.identifierPlaceholder" placeholder="Email or Suite Number" required>

            <div class="password-container">
                <!-- FIXED: Added id="password" -->
                <input type="password" id="password" data-i18n-placeholder="auth.login.passwordPlaceholder" placeholder="Password" required>
                <i class="fa fa-eye toggle-password"
                   onclick="togglePwd('password', this)"></i>
            </div>

            <a href="#" class="forgot-link" data-i18n="auth.login.forgot">Forgot password?</a>

            <button type="submit" data-i18n="auth.login.button">Log In</button>
        </form>
        <p id="loginMessage" class="auth-status" role="status" aria-live="polite"></p>

        <p><span data-i18n="auth.login.noAccount">Don't have an account?</span> <a href="/register" data-i18n="auth.login.registerLink">Register</a></p>
    </div>

<script>
const t = (key, fallback = "") => window.ParcelLinkI18n?.t?.(key, fallback) || fallback;

function persistUserSession(user, token) {
    localStorage.setItem("parcelUser", JSON.stringify(user));
    if (token) {
        localStorage.setItem("parcelAuthToken", token);
    } else {
        localStorage.removeItem("parcelAuthToken");
    }
    sessionStorage.setItem("user", JSON.stringify(user));
    if (token) {
        sessionStorage.setItem("userToken", token);
    } else {
        sessionStorage.removeItem("userToken");
    }
}

function clearUserSession() {
    localStorage.removeItem("parcelUser");
    localStorage.removeItem("parcelAuthToken");
    sessionStorage.removeItem("user");
    sessionStorage.removeItem("userToken");
}

function setLoginMessage(messageNode, text, type) {
    messageNode.className = `auth-status ${type || ""}`.trim();
    messageNode.textContent = text;
}

// ============= Fix missing togglePwd function ============
function togglePwd(id, icon) {
    const field = document.getElementById(id);
    if (!field) return;
    field.type = field.type === "password" ? "text" : "password";
    icon.classList.toggle("fa-eye-slash");
}

// ============= LOGIN SCRIPT =================
document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("loginForm");
    const message = document.getElementById("loginMessage");
    const submitButton = form?.querySelector('button[type="submit"]');

    if (!form || !message || !submitButton) {
        console.error("loginForm not found!");
        return;
    }

    const lastRegisteredEmail = localStorage.getItem("parcelLastRegisteredEmail");
    if (lastRegisteredEmail && !document.getElementById("identifier").value.trim()) {
        document.getElementById("identifier").value = lastRegisteredEmail;
    }

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const identifier = document.getElementById("identifier").value.trim();
        const password = document.getElementById("password").value.trim();
        clearUserSession();
        setLoginMessage(message, t("auth.login.loading", "Signing you in..."), "info");
        submitButton.disabled = true;
        submitButton.setAttribute("aria-busy", "true");

        try {
            const res = await fetch("/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ identifier, password })
            });

            const data = await res.json();
            console.log("Login Response:", data);

            if (res.ok && data.success) {
                persistUserSession(data.user, data.token);
                setLoginMessage(message, `${data.message || t("auth.login.success", "Login successful.")} ${t("client.loginSuccess", "Loading your dashboard...")}`, "success");
                localStorage.removeItem("parcelLastRegisteredEmail");
                window.setTimeout(() => {
                    window.location.href = "/dashboard";
                }, 700);
            } else {
                setLoginMessage(message, data.message || t("auth.login.error", "Something went wrong. Try again."), "error");
            }

        } catch (error) {
            console.error("Login error:", error);
            setLoginMessage(message, t("auth.login.networkError", "Unable to reach the server. Please try again."), "error");
        } finally {
            submitButton.disabled = false;
            submitButton.removeAttribute("aria-busy");
        }
    });
});
</script>
<!-- ensure login page uses /js path -->
<script src="/js/i18n.js"></script>
<script src="/js/site.js"></script>
</body>
</html>
