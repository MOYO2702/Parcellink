<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/css/theme.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title data-i18n="auth.login.metaTitle">ParcelLink | Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="auth-page">

    <div class="auth-wrapper">
        <img src="/images/logo.png" alt="ParcelLink Logo" class="auth-logo">

        <h2 data-i18n="auth.login.heading">Welcome</h2>
        <p data-i18n="auth.login.subtitle">Log in to your ParcelLink Account</p>

        <!-- FIXED: Added id="loginForm" -->
        <form id="loginForm">

            <!-- FIXED: Added id="identifier" -->
            <input type="text" id="identifier" data-i18n-placeholder="auth.login.identifierPlaceholder" placeholder="Email or Suite Number" required>

            <div class="password-container">
                <!-- FIXED: Added id="password" -->
                <input type="password" id="password" data-i18n-placeholder="auth.login.passwordPlaceholder" placeholder="Password" required>
                <i class="fa fa-eye toggle-password"
                   onclick="togglePwd('password', this)"></i>
            </div>

            <a href="#" class="forgot-link" data-i18n="auth.login.forgot">Forgot password?</a>

            <button type="submit" data-i18n="auth.login.button">Log In</button>
        </form>

        <p><span data-i18n="auth.login.noAccount">Don't have an account?</span> <a href="/register" data-i18n="auth.login.registerLink">Register</a></p>
    </div>

<script>
const t = (key, fallback = "") => window.ParcelLinkI18n?.t?.(key, fallback) || fallback;

// ============= Fix missing togglePwd function ============
function togglePwd(id, icon) {
    const field = document.getElementById(id);
    field.type = field.type === "password" ? "text" : "password";
    icon.classList.toggle("fa-eye-slash");
}

// ============= LOGIN SCRIPT =================
document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("loginForm");

    if (!form) {
        console.error("loginForm not found!");
        return;
    }

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const identifier = document.getElementById("identifier").value.trim();
        const password = document.getElementById("password").value.trim();

        try {
            const res = await fetch("/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ identifier, password })
            });

            const data = await res.json();
            console.log("Login Response:", data);

            if (data.success) {
                alert(`${t("auth.login.welcome", "Welcome")} ${data.user.fullName}`);
                localStorage.setItem("parcelUser", JSON.stringify(data.user));
                if (data.token) {
                    localStorage.setItem("parcelAuthToken", data.token);
                }
                window.location.href = "/dashboard";  // redirect to homepage
            } else {
                alert(" " + data.message);
            }

        } catch (error) {
            console.error("Login error:", error);
            alert(t("auth.login.error", "Something went wrong. Try again."));
        }
    });
});
</script>
<!-- ensure login page uses /js path -->
<script src="/js/i18n.js"></script>
<script src="/js/site.js"></script>
</body>
</html>
