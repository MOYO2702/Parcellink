databases:
  - name: parcellink-db
    databaseName: parcellink
    user: parcellink
    plan: free

services:
  - type: web
    name: parcellink-api
    env: node
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm run db:init && npm start
    healthCheckPath: /api/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '3000'
      - key: DATABASE_URL
        fromDatabase:
          name: parcellink-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false
      - key: STAFF_PROVISION_KEY
        sync: false
      - key: AUTH_TOKEN_SECRET
        sync: false
      - key: AUTH_TOKEN_TTL_HOURS
        value: '24'
      - key: ALLOW_LEGACY_STAFF_LOGIN
        value: 'false'
      - key: ALLOWED_ORIGINS
        sync: false
      - key: EMAIL_HOST
        value: smtp.office365.com
      - key: EMAIL_PORT
        value: '587'
      - key: EMAIL_SECURE
        value: 'false'
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        value: admin@parcellinkuae.com
      - key: EMAIL_FROM_NAME
        value: Parcel Link Delivery Services
      - key: EMAIL_REPLY_TO
        value: admin@parcellinkuae.com
      - key: HR_NOTIFICATION_EMAIL
        value: admin@parcellinkuae.com
      - key: SYSTEM_USER_EMAIL
        value: system@parcellink.local
      - key: RATE_LIMIT_MAX
        value: '120'
