<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/css/theme.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title data-i18n="dashboard.metaTitle">ParcelLink | Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f5fb;
            margin: 0;
        }

        /* Unified Header Style */
        header{
            height:86px;
            background:#fff;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 48px;
            box-shadow:0 2px 14px rgba(0,0,0,0.07);
            position:sticky;
            top:0;
            z-index:100;
        }
        header img{
            height:70px;
            width:auto;
            display:block;
            transform:scale(2);
            transform-origin:left center;
        }
        header nav ul{
            list-style:none;
            display:flex;
            gap:34px;
        }
        header nav ul li a{
            text-decoration:none;
            color:#001c48;
            font-size:16px;
            font-weight:500;
            padding:6px 10px;
            border-radius:6px;
        }
        header nav ul li a.active{
            background:rgba(10,102,255,0.08);
            color:#0a66ff;
        }

        .logout-btn {
            background:linear-gradient(135deg,#0f3686,#1d6cff);
            color:white;
            padding:10px 16px;
            border-radius:999px;
            cursor:pointer;
            border:none;
            font-size:14px;
            font-weight:600;
            margin-left:12px;
            display:inline-flex;
            align-items:center;
            gap:8px;
            box-shadow:0 10px 22px rgba(18,66,166,0.2);
            transition:transform .2s ease, box-shadow .2s ease, opacity .2s ease;
        }

        .logout-btn:hover {
            transform:translateY(-1px);
            box-shadow:0 14px 28px rgba(18,66,166,0.24);
        }

        .main {
            padding: 40px;
        }

        h1 {
            color:#1a237e;
            margin-bottom: 25px;
        }

        .card-grid {
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
            gap:20px;
        }

        .card {
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 4px 8px rgba(0,0,0,0.08);
            transition:0.3s;
        }

        .card:hover {
            transform:translateY(-5px);
        }

        .card i {
            font-size:28px;
            color:#6a1b9a;
        }

        .card-title {
            font-size:18px;
            margin-top:10px;
        }

        .card-value {
            font-size:24px;
            font-weight:bold;
            margin-top:5px;
        }

        .debug-banner {
            padding: 10px 16px;
            margin-bottom: 20px;
            border-radius: 10px;
            background: rgba(18, 66, 166, 0.08);
            color: #0f3686;
            font-size: 14px;
            border: 1px solid rgba(18, 66, 166, 0.12);
            max-width: 780px;
        }

        /* RESPONSIVE */
        @media (max-width: 992px) {
            header{
                padding:0 24px;
            }
            header nav ul{
                gap:20px;
            }
            .main{
                padding:40px 30px;
            }
            .card-grid{
                grid-template-columns:repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            header{
                padding:0 20px;
                height:auto;
                min-height:70px;
                flex-wrap:wrap;
            }
            header img{
                height:60px;
                transform:scale(1.6);
            }
            header nav{
                width:100%;
                margin-top:10px;
            }
            header nav ul{
                flex-wrap:wrap;
                gap:12px;
                justify-content:center;
            }
            header nav ul li a{
                font-size:14px;
                padding:6px 10px;
            }
            .logout-btn{
                font-size:13px;
                padding:8px 12px;
                margin-left:0;
            }
            .main{
                padding:30px 20px;
            }
            h1{
                font-size:24px;
            }
            .card-grid{
                grid-template-columns:1fr;
                gap:15px;
            }
            .card{
                padding:20px;
            }
            .card i{
                font-size:32px;
            }
            .card-title{
                font-size:16px;
            }
            .card-value{
                font-size:20px;
            }
        }

        @media (max-width: 480px) {
            header img{
                height:50px;
                transform:scale(1.4);
            }
            .main{
                padding:20px 15px;
            }
            h1{
                font-size:20px;
            }
            .card{
                padding:18px;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <a href="/"><img src="/images/logo.png" alt="ParcelLink"></a>
        <nav>
            <ul>
                <li><a href="/" data-i18n="nav.home">Home</a></li>
                <li><a href="/track" data-i18n="nav.track">Track</a></li>
                <li><a href="/send" data-i18n="nav.send">Send</a></li>
                <li><a href="/services" data-i18n="nav.services">Services</a></li>
                <li><a href="/career" data-i18n="nav.careers">Careers</a></li>
                <li><a href="/help" data-i18n="nav.help">Help</a></li>
                <li><a href="/clientzone" data-i18n="nav.clientzone">Client Zone</a></li>
                <li><button class="logout-btn" onclick="logout()"><i class="fa fa-sign-out-alt" aria-hidden="true"></i><span data-i18n="dashboard.logout">Logout</span></button></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN CONTENT -->
    <div class="main">
        <h1 id="welcomeTitle" data-i18n="dashboard.welcomeTitle">Welcome to your Dashboard</h1>
        <div class="debug-banner">Dashboard build: v1.1 - Zero defaults, real data fetch. If you see old numbers, redeploy on Render.</div>

        <div class="card-grid">

            <div class="card">
                <i class="fa fa-box"></i>
                <div class="card-title" data-i18n="dashboard.parcelsSent">Parcels Sent</div>
                <div class="card-value" id="parcelsSentValue">0</div>
            </div>

            <div class="card">
                <i class="fa fa-truck"></i>
                <div class="card-title" data-i18n="dashboard.inTransit">In Transit</div>
                <div class="card-value" id="inTransitValue">0</div>
            </div>

            <div class="card">
                <i class="fa fa-check-circle"></i>
                <div class="card-title" data-i18n="dashboard.delivered">Delivered</div>
                <div class="card-value" id="deliveredValue">0</div>
            </div>

            <div class="card">
                <i class="fa fa-wallet"></i>
                <div class="card-title" data-i18n="dashboard.balance">Account Balance</div>
                <div class="card-value" id="accountBalanceValue">AED 0</div>
            </div>

        </div>
    </div>

<script>
    const t = (key, fallback = "") => window.ParcelLinkI18n?.t?.(key, fallback) || fallback;
    ////////////////////////////////////////////////////////////
    // LOAD USER SESSION FROM LOCAL STORAGE
    ////////////////////////////////////////////////////////////

    function readStoredUser() {
        try {
            return JSON.parse(localStorage.getItem("parcelUser") || sessionStorage.getItem("user") || "{}");
        } catch {
            return {};
        }
    }

    const user = readStoredUser();
    const authToken = localStorage.getItem("parcelAuthToken") || sessionStorage.getItem("userToken") || "";

    const parcelsSentValue = document.getElementById("parcelsSentValue");
    const inTransitValue = document.getElementById("inTransitValue");
    const deliveredValue = document.getElementById("deliveredValue");
    const accountBalanceValue = document.getElementById("accountBalanceValue");
    const welcomeTitleEl = document.getElementById("welcomeTitle");

    async function loadDashboardMetrics() {
        if (!user?.email) {
            return;
        }

        try {
            const parcelResponse = await fetch(`/api/parcels/user/${encodeURIComponent(user.email)}`, {
                headers: {
                    Authorization: authToken ? `Bearer ${authToken}` : ""
                }
            });
            const parcelData = await parcelResponse.json();

            const parcels = parcelData.success ? parcelData.parcels || [] : [];
            const parcelsSent = parcels.length;
            const deliveredCount = parcels.filter((p) => {
                const lastStatus = p.statusHistory?.[p.statusHistory.length - 1];
                return lastStatus?.status?.toLowerCase().includes("delivered");
            }).length;
            const inTransitCount = parcelsSent - deliveredCount;

            parcelsSentValue.textContent = parcelsSent;
            inTransitValue.textContent = inTransitCount >= 0 ? inTransitCount : 0;
            deliveredValue.textContent = deliveredCount;

            const receiptResponse = await fetch(`/api/receipts/${encodeURIComponent(user.email)}`, {
                headers: {
                    Authorization: authToken ? `Bearer ${authToken}` : ""
                }
            });
            const receiptData = await receiptResponse.json();
            const balance = receiptData.success ? (receiptData.receipts || []).reduce((sum, receipt) => {
                return sum + Number(receipt.amount || 0);
            }, 0) : 0;
            accountBalanceValue.textContent = `AED ${balance.toFixed(2)}`;
        } catch (err) {
            console.error("Error loading dashboard metrics:", err);
            parcelsSentValue.textContent = "0";
            inTransitValue.textContent = "0";
            deliveredValue.textContent = "0";
            accountBalanceValue.textContent = "AED 0";
        }
    }

    if (!user.fullName || !authToken) {
        window.location.href = "/login";
    } else {
        console.log("Dashboard updated code loaded.");
        console.log("Dashboard user:", user.email, "auth token present:", Boolean(authToken));
        welcomeTitleEl.textContent = `${t("dashboard.welcomeUser", "Welcome back")}, ${user.fullName}!`;
        loadDashboardMetrics();
    }

    ////////////////////////////////////////////////////////////
    // LOGOUT
    ////////////////////////////////////////////////////////////

    function logout() {
        localStorage.removeItem("parcelUser");
        localStorage.removeItem("parcelAuthToken");
        localStorage.removeItem("parcelLastRegisteredEmail");
        sessionStorage.removeItem("user");
        sessionStorage.removeItem("userToken");
        window.location.href = "/login";
    }
</script>
<!-- add script using /js if needed -->
<script src="/js/i18n.js"></script>
<script src="/js/site.js"></script>
</body>
</html>
