<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="/css/theme.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParcelLink | Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f5fb;
            margin: 0;
        }

        /* Unified Header Style */
        header{
            height:86px;
            background:#fff;
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 48px;
            box-shadow:0 2px 14px rgba(0,0,0,0.07);
            position:sticky;
            top:0;
            z-index:100;
        }
        header img{
            height:70px;
            width:auto;
            display:block;
            transform:scale(2);
            transform-origin:left center;
        }
        header nav ul{
            list-style:none;
            display:flex;
            gap:34px;
        }
        header nav ul li a{
            text-decoration:none;
            color:#001c48;
            font-size:16px;
            font-weight:500;
            padding:6px 10px;
            border-radius:6px;
        }
        header nav ul li a.active{
            background:rgba(10,102,255,0.08);
            color:#0a66ff;
        }

        .logout-btn {
            background:#1a237e;
            color:white;
            padding:8px 20px;
            border-radius:6px;
            cursor:pointer;
            border:none;
            font-size:14px;
            margin-left:20px;
        }

        .main {
            padding: 40px;
        }

        h1 {
            color:#1a237e;
            margin-bottom: 25px;
        }

        .card-grid {
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
            gap:20px;
        }

        .card {
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 4px 8px rgba(0,0,0,0.08);
            transition:0.3s;
        }

        .card:hover {
            transform:translateY(-5px);
        }

        .card i {
            font-size:28px;
            color:#6a1b9a;
        }

        .card-title {
            font-size:18px;
            margin-top:10px;
        }

        .card-value {
            font-size:24px;
            font-weight:bold;
            margin-top:5px;
        }

        /* RESPONSIVE */
        @media (max-width: 992px) {
            header{
                padding:0 24px;
            }
            header nav ul{
                gap:20px;
            }
            .main{
                padding:40px 30px;
            }
            .card-grid{
                grid-template-columns:repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            header{
                padding:0 20px;
                height:auto;
                min-height:70px;
                flex-wrap:wrap;
            }
            header img{
                height:60px;
                transform:scale(1.6);
            }
            header nav{
                width:100%;
                margin-top:10px;
            }
            header nav ul{
                flex-wrap:wrap;
                gap:12px;
                justify-content:center;
            }
            header nav ul li a{
                font-size:14px;
                padding:6px 10px;
            }
            .logout-btn{
                font-size:13px;
                padding:6px 12px;
            }
            .main{
                padding:30px 20px;
            }
            h1{
                font-size:24px;
            }
            .card-grid{
                grid-template-columns:1fr;
                gap:15px;
            }
            .card{
                padding:20px;
            }
            .card i{
                font-size:32px;
            }
            .card-title{
                font-size:16px;
            }
            .card-value{
                font-size:20px;
            }
        }

        @media (max-width: 480px) {
            header img{
                height:50px;
                transform:scale(1.4);
            }
            .main{
                padding:20px 15px;
            }
            h1{
                font-size:20px;
            }
            .card{
                padding:18px;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <a href="/"><img src="/images/logo.png" alt="ParcelLink"></a>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/track">Track</a></li>
                <li><a href="/send">Send</a></li>
                <li><a href="/services">Services</a></li>
                <li><a href="/career">Careers</a></li>
                <li><a href="/help">Help</a></li>
                <li><a href="/clientzone">Client Zone</a></li>
                <li><button class="logout-btn" onclick="logout()">Logout</button></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN CONTENT -->
    <div class="main">
        <h1 id="welcomeTitle">Welcome to your Dashboard</h1>

        <div class="card-grid">

            <div class="card">
                <i class="fa fa-box"></i>
                <div class="card-title">Parcels Sent</div>
                <div class="card-value">12</div>
            </div>

            <div class="card">
                <i class="fa fa-truck"></i>
                <div class="card-title">In Transit</div>
                <div class="card-value">3</div>
            </div>

            <div class="card">
                <i class="fa fa-check-circle"></i>
                <div class="card-title">Delivered</div>
                <div class="card-value">8</div>
            </div>

            <div class="card">
                <i class="fa fa-wallet"></i>
                <div class="card-title">Account Balance</div>
                <div class="card-value">$250</div>
            </div>

        </div>
    </div>

<script>
    ////////////////////////////////////////////////////////////
    // LOAD USER SESSION FROM LOCAL STORAGE
    ////////////////////////////////////////////////////////////

    const user = JSON.parse(localStorage.getItem("parcelUser") || "{}");

    if (!user.fullName) {
        window.location.href = "/login";
    } else {
        document.getElementById("welcomeTitle").innerText =
            "Welcome, " + user.fullName;
    }

    ////////////////////////////////////////////////////////////
    // LOGOUT
    ////////////////////////////////////////////////////////////

    function logout() {
        localStorage.removeItem("parcelUser");
        window.location.href = "/login";
    }
</script>
<!-- add script using /js if needed -->
<script src="/js/script.js"></script>
</body>
</html>
